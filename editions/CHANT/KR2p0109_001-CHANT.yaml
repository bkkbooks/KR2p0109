body:
  text: 武威漢簡雜簡及其它考釋日忌雜占木簡考釋一日忌木簡甲河平年四月日諸文學弟子出穀五千餘斛六不乏蹇人買席辟壬庚河魁以祠家邦必揚二日忌木簡乙甲毋治宅不居必荒乙毋內財不保必亡丙毋直衣三日忌木簡乙丁毋威多作傷戊毋度海後必死亡己毋射矦還受其央四日忌木簡乙庚辛壬毋必得五日忌木簡丙辰毋治喪六日忌木簡丙午毋蓋屋必見火光未毋飲藥必得之毒申毋財衣不煩必亡七日忌木簡丙酉毋召客不鬧若傷戌毋內畜不死必亡亥毋內婦不宜姑公八雜占木簡有生財有吏事有惡言者有客思之有諦泣令人遠行九雜占木簡有熹事君思之君子思之有熹事令人得財十雜占木簡有取有之者有風雨十一雜占木簡見婦人
