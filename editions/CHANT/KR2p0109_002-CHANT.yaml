body:
  text: 武威漢簡雜簡及其它考釋王杖十簡考釋四制詔丞相御史高皇帝以來至本二年勝甚哀老小高年受王杖上有鳩使百姓望見之五比於節有敢妄罵詈毆之者比逆不道得出入官府郎第行馳道旁道市賣復毋所與六如山東復有旁人飬謹者常養扶持復除之明在蘭臺石室之中王杖不鮮明七得更繕治之河平元年汝南西陵縣昌里先年七十受王杖部游徼吳賞使從者八毆擊先用訴地大守上𤅊廷尉報罪名九明白賞當棄市二制詔御史曰年七十受王杖者比六百石入官廷不趨犯罪耐以上毋二尺告劾有敢徵召侵辱三者比大逆不道建始二年九月甲辰下十孝平皇帝元始五年幼伯生永平十五年受王杖一蘭臺令第卅三御史令第𠦜三尚書令滅受在金
